<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kwara Poly Fees System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .sidebar { background: #1a1a2e; min-height: 100vh; color: #fff; position: fixed; width: 220px; top: 0; left: 0; }
        .sidebar a { color: #ccc; text-decoration: none; display: block; padding: 12px 20px; border-radius: 8px; margin: 2px 8px; transition: .2s; }
        .sidebar a:hover, .sidebar a.active { background: #16213e; color: #fff; }
        .sidebar .brand { padding: 20px; font-size: 1.1rem; font-weight: 700; color: #00d4ff; border-bottom: 1px solid #333; margin-bottom: 10px; }
        .main-content { margin-left: 220px; padding: 30px; }
        .stat-card { border-left: 4px solid #00d4ff; }
        .stat-card.green { border-left-color: #28a745; }
        .stat-card.orange { border-left-color: #fd7e14; }
        .stat-card.purple { border-left-color: #6f42c1; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
        .btn-primary { background: #00d4ff; border: none; font-weight: 600; }
        .btn-primary:hover { background: #00b8e6; }
        .receipt-box { background: #fff; border: 2px dashed #00d4ff; border-radius: 16px; padding: 30px; max-width: 500px; margin: auto; }
        .qr-placeholder { width: 200px; height: 200px; object-fit: contain; margin: 10px auto; display: block; }
        @media print { .sidebar, .btn, .no-print { display: none !important; } .main-content { margin: 0 !important; padding: 0 !important; } }
        @media (max-width: 768px) { .sidebar { width: 60px; } .sidebar .brand span, .sidebar a span { display: none; } .main-content { margin-left: 60px; } }
    </style>
</head>
<body>
    {% if session.admin_id %}
    <div class="sidebar">
        <div class="brand">🏫 Kwara Poly<br><small style="color:#888;font-size:.7rem">Fees Management</small></div>
        <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.endpoint=='dashboard' else '' }}"><span>📊</span> Dashboard</a>
        <a href="{{ url_for('students_page') }}" class="{{ 'active' if request.endpoint=='students_page' else '' }}"><span>👥</span> Students</a>
        <a href="{{ url_for('record_payment_page') }}" class="{{ 'active' if request.endpoint=='record_payment_page' else '' }}"><span>💰</span> Record Payment</a>
        <a href="{{ url_for('payments_page') }}" class="{{ 'active' if request.endpoint=='payments_page' else '' }}"><span>📋</span> All Payments</a>
        <a href="{{ url_for('verify_page') }}" class="{{ 'active' if request.endpoint=='verify_page' else '' }}"><span>✅</span> Verify QR</a>
        <a href="{{ url_for('logout') }}" class="no-print"><span>🚪</span> Logout</a>
    </div>
    <div class="main-content">{% block content %}{% endblock %}</div>
    {% else %}
    <div class="container py-5" style="max-width:400px;margin:auto;padding-top:80px">
        {% block login_content %}{% endblock %}
    </div>
    {% endif %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
